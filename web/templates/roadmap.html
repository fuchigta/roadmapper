<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('roadmapper:theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;}());</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Roadmap.Title}} — {{.Site.Title}}</title>
  <meta name="description" content="{{.Roadmap.Description}}">
  {{if .Site.Repo}}
  <link rel="canonical" href="{{.Site.Repo}}">
  {{end}}
  <!-- OGP -->
  <meta property="og:title" content="{{.Roadmap.Title}} — {{.Site.Title}}">
  <meta property="og:description" content="{{.Roadmap.Description}}">
  <meta property="og:type" content="website">
  {{if .OGPUrl}}<meta property="og:url" content="{{.OGPUrl}}">{{end}}
  <link rel="stylesheet" href="{{.AssetBase}}style.css">
  <style>
    :root {
      --brand: {{.BrandColor}};
      --brand-light: {{.BrandColorLight}};
    }
    {{.ChromaCSS}}
  </style>
</head>
<body>
  <header class="site-header">
    <a href="{{.BasePath}}index.html" class="site-title">{{.Site.Title}}</a>
    <button id="theme-toggle" aria-label="テーマ切替" title="ライト/ダーク">🌙</button>
  </header>

  <main class="roadmap-page">
    <div class="roadmap-header">
      <h1>{{.Roadmap.Title}}</h1>
      {{if .Roadmap.Description}}<p class="roadmap-desc">{{.Roadmap.Description}}</p>{{end}}
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
        <span class="progress-label" id="progress-label">0%</span>
      </div>
      <div class="toolbar">
        <div class="search-wrap">
          <input type="search" id="node-search" placeholder="ノードを検索… (/)">
          <ul id="search-results" class="search-results" hidden></ul>
        </div>
        <button id="export-btn" title="進捗をエクスポート">エクスポート</button>
        <button id="import-btn" title="進捗をインポート">インポート</button>
        <button id="share-btn" title="進捗をURLでシェア">シェア</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </div>

    <div class="diagram-wrap" id="diagram-wrap">
      <button id="zoom-reset" class="zoom-reset" title="全体表示にリセット">⊡</button>
      {{.SVG}}
    </div>
  </main>

  <!-- サイドパネル -->
  <aside id="side-panel" class="side-panel" aria-hidden="true">
    <div id="panel-resizer" class="panel-resizer" role="separator"
         aria-orientation="vertical" aria-label="パネル幅を変更"></div>
    <div class="panel-inner">
      <div class="panel-header">
        <h2 id="panel-title"></h2>
        <div class="panel-actions">
          <select id="node-state" aria-label="進捗状態">
            <option value="none">未着手</option>
            <option value="in-progress">学習中</option>
            <option value="done">完了</option>
            <option value="skipped">スキップ</option>
          </select>
          <button id="panel-close" aria-label="閉じる">✕</button>
        </div>
      </div>
      <div id="panel-meta" class="panel-meta" hidden>
        <span id="panel-difficulty" class="badge" hidden></span>
        <span id="panel-time" class="badge badge-time" hidden></span>
      </div>
      <div id="panel-relations" class="panel-relations" hidden>
        <div id="panel-parents" class="panel-relation-group" hidden>
          <h4>前提条件</h4>
          <ul id="panel-parents-list"></ul>
        </div>
        <div id="panel-children" class="panel-relation-group" hidden>
          <h4>次のステップ</h4>
          <ul id="panel-children-list"></ul>
        </div>
      </div>
      <div id="panel-content" class="panel-content"></div>
      {{if .Site.Repo}}
      <a id="edit-link" class="edit-link" target="_blank" rel="noopener">この記事を編集</a>
      {{end}}
    </div>
  </aside>
  <div id="overlay" class="overlay"></div>

  <script>
    window.ROADMAP_DATA = Object.assign({{.NodeDataJSON}}, {__order: {{.NodeOrderJSON}}});
    window.SITE_CONFIG = {
      basePath: {{.BasePathJSON}},
      repo: {{.RepoJSON}},
      editBranch: {{.EditBranchJSON}},
      roadmapId: {{.RoadmapIdJSON}}
    };
  </script>
  <script src="{{.AssetBase}}app.js"></script>
  {{if .HasMermaid}}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    document.addEventListener('roadmapper:panelopen', () => mermaid.run({ querySelector: '.panel-content .mermaid' }));
  </script>
  {{end}}
</body>
</html>
