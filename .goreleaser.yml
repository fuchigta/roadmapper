version: 2

project_name: roadmapper

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: roadmapper
    main: ./cmd/roadmapper
    binary: roadmapper
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: roadmapper
    ids: [roadmapper]
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "新機能"
      regexp: "^feat"
      order: 0
    - title: "バグ修正"
      regexp: "^fix"
      order: 1
    - title: "リファクタリング"
      regexp: "^refactor"
      order: 2
    - title: "その他"
      order: 999

release:
  github:
    owner: fuchigta
    name: roadmapper
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Version}}"
